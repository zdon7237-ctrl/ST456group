model_name: distilgpt2
train_path: data/processed/train.jsonl
eval_path: data/processed/val.jsonl
output_dir: artifacts/e2_structured_full
context_size: 2
context_format: structured
training_mode: full
aux_objective: none
aux_weight: 0.1
